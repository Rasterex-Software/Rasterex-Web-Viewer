<div class="magnify-wrapper"
  #wrapper
  [class.hidden]="!isVisible"
  [class.precision-mode]="precisionMode"
  (mousedown)="startMove($event)"
  (mousemove)="onMove($event)"
  (mouseup)="endMove()"
  (mouseleave)="endMove()"
  (touchstart)="startMove($event)"
  (touchmove)="onMove($event)"
  (touchend)="endMove()">

    <!-- HEADER -->
    <div class="header">
        <span class="title">Magnifier</span>
        <button class="close-btn" (click)="close()">✕</button>
    </div>

    <!-- CANVAS AREA -->
    <div class="canvas-container"
         [style.width.px]="width"
         [style.height.px]="height">

        <canvas #magnifierCanvas></canvas>
        <canvas #magnifierSnap class="overlay"></canvas>
        <canvas #magnifierOverlay class="overlay"></canvas>
        
    </div>

    <!-- FOOTER CONTROLS -->
    <div class="controls">
      <button (click)="zoomOut()">-</button>
      <button (click)="zoomIn()">+</button>
    </div>
    
</div>
