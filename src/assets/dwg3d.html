<style>
        :root {
            --accent: #31BD59;

            --light-secondary: #EDF1F2;

            --top-nav-border-bottom-color-active: transparent;
            --toolbar-background: #FFFFFF;
            --toolbar-color: #333C4E;
            --toolbar-background-active: #31BD59
        }

        body,
        html {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background);
            height: 100%;
            overflow: hidden
        }

        a {
            font-family: inherit;
            text-decoration: none;
            color: #0078d4;
         }


        *::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        *::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px
        }

        *::-webkit-scrollbar-thumb {
            background: rgba(237, 241, 242, .9);
            border-radius: 2px
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #EDF1F2
        }
    </style>

<style>

.row:after {

      var viewerwin = document.getElementById('rxview').contentWindow; 

      await viewerwin.RxCore.closeDocumentEx();
      viewerwin.RxCore.openFile(myfileobject);

   }

   function OpenFile(filename,cacheid){

      var myfileobject = 
      {
         filepath: "E:\\\\Rasterex\\\\Upload\\\\" + filename,
         cacheid: cacheid,
         displayname: filename,
         mime: "application/dwg"
      };

      openFileObject(myfileobject);


   }
