<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Foxit PDF SDK – Watermark Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 1rem;
      display: flex;
      flex-direction: row;
      height: 100vh;
      box-sizing: border-box;
      gap: 1rem;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 1rem;
      width: 320px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      height: calc(100vh - 2rem);
      box-sizing: border-box;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
    }
    input, select {
      padding: 0.4rem;
      width: 100%;
      box-sizing: border-box;
      font-size: 0.9rem;
    }

    button {
      padding: 0.6rem;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btnApply { background: #2b6cb0; }
    #btnApply:hover { background: #265a93; }
    #btnRemove { background: #a33; }
    #btnRemove:hover { background: #822; }

    iframe {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 6px;
      height: 100%;
    }

    h1 {
      margin-top: 0;
      color: #2b6cb0;
      font-size: 1.2rem;
    }

    p {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- Left panel -->
  <div class="panel">
    <h1>Watermark Demo</h1>
    <p>Use this panel to configure and apply text watermarks via <code>RxCore.addWatermarkRender()</code>.</p>

    <label>Watermark Text</label>
    <input id="wmText" type="text" value="CONFIDENTIAL">

    <label>Font Name</label>
    <input id="wmFontName" type="text" value="Open Sans">

    <label>Font File URL</label>

    <input id="wmFontUrl" type="text" value="/assets/fonts/OpenSans-Regular.ttf">


    <label>Font Size</label>
    <input id="wmFontSize" type="number" value="48">

    <label>Color</label>
    <input id="wmColor" type="color" value="#444444">

    <label>Rotation (°)</label>
    <input id="wmRotation" type="number" value="45">

    <label>Opacity (%)</label>
    <input id="wmOpacity" type="number" value="30">

    <label>Scale</label>
    <input id="wmScale" type="number" step="0.1" value="1">

    <label>Position</label>
    <select id="wmPosition">
      <option value="Center" selected>Center</option>
      <option value="TopLeft">Top Left</option>
      <option value="TopRight">Top Right</option>
      <option value="BottomLeft">Bottom Left</option>
      <option value="BottomRight">Bottom Right</option>
    </select>

    <button id="btnApply">Add Watermark</button>
    <!-- <button id="btnRemove">Remove Watermark</button> -->
  </div>

  <!-- Right-side viewer -->
  <iframe id="RxView360" src="../index.html" title="PDF Viewer"></iframe>

  <script>
    const viewerFrame = document.getElementById('RxView360');

    async function applyWatermark() {
      const text = document.getElementById("wmText").value;
      const settings = {
        fontUrl: document.getElementById("wmFontUrl").value,
        fontName: document.getElementById("wmFontName").value,
        fontSize: parseInt(document.getElementById("wmFontSize").value, 10),
        color: document.getElementById("wmColor").value,
        rotation: parseInt(document.getElementById("wmRotation").value, 10),
        opacity: parseInt(document.getElementById("wmOpacity").value, 10),
        scale: parseFloat(document.getElementById("wmScale").value),
        position: document.getElementById("wmPosition").value,
        useRelativeScale: true,
        offsetX: 0,
        offsetY: 0,
        fontStyle: "normal"
      };

      const viewerCore = viewerFrame?.contentWindow?.RxCore;
      if (viewerCore && typeof viewerCore.addWatermarkRender === "function") {
        await viewerCore.addWatermarkRender(text, settings);
        console.log("✅ Watermark applied through iframe viewer.");
      } else {
        console.error("❌ RxCore.addWatermarkRender not available inside iframe.");
      }
    }

    async function removeWatermark() {
      const viewerCore = viewerFrame?.contentWindow?.RxCore;
      if (viewerCore && typeof viewerCore.removeWatermarkFromAllPages === "function") {
        await viewerCore.removeWatermarkFromAllPages();
        console.log("🧹 Watermarks removed.");
      } else {
        console.error("❌ RxCore.removeWatermarkFromAllPages not available.");
      }
    }

    document.getElementById("btnApply").addEventListener("click", applyWatermark);
    document.getElementById("btnRemove").addEventListener("click", removeWatermark);
  </script>
</body>
</html>
